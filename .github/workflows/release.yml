name: Release

on:
  workflow_dispatch:
    inputs:
      publish_auth:
        description: npm publish authentication mode
        required: true
        default: oidc
        type: choice
        options:
          - oidc
          - npm-token
      release_now:
        description: set to true to allow manual npm publish
        required: true
        default: false
        type: boolean
      version_bump:
        description: version bump to publish manually
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify project
        run: |
          bun run check
          bun run build

      - name: Validate manual publish inputs
        run: |
          if [ "${{ inputs.release_now }}" != "true" ]; then
            echo "Manual publish skipped because release_now is not true."
            exit 0
          fi
          case "${{ inputs.version_bump }}" in
            patch|minor|major) ;;
            *) echo "::error::version_bump must be patch, minor, or major."; exit 1 ;;
          esac

      - name: Publish specified version to npm
        if: inputs.release_now == true
        env:
          NPM_TOKEN: ${{ inputs.publish_auth == 'npm-token' && secrets.NPM_TOKEN || '' }}
          NODE_AUTH_TOKEN: ${{ inputs.publish_auth == 'npm-token' && secrets.NPM_TOKEN || '' }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          TARGET_VERSION=$(node -e "const [major, minor, patch] = '${CURRENT_VERSION}'.split('.').map(Number); const bump = '${{ inputs.version_bump }}'; const next = bump === 'major' ? [major + 1, 0, 0] : bump === 'minor' ? [major, minor + 1, 0] : [major, minor, patch + 1]; console.log(next.join('.'));")
          echo "Preparing ${PACKAGE_NAME}@${TARGET_VERSION} (${CURRENT_VERSION} + ${{ inputs.version_bump }})"
          if npm view "${PACKAGE_NAME}@${TARGET_VERSION}" version --registry=https://registry.npmjs.org > /dev/null 2>&1; then
            echo "::error::${PACKAGE_NAME}@${TARGET_VERSION} already exists on npm."
            exit 1
          fi
          npm pkg set version="${TARGET_VERSION}"
          npm publish
